services:
  backend:
    build: ./backend
    container_name: ${INSTANCE_NAME:-atv}-backend
    restart: always
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/media:/app/media

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_BACKEND_URL=${PUBLIC_BACKEND_URL}
    container_name: ${INSTANCE_NAME:-atv}-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - NEXT_PUBLIC_BACKEND_URL=${PUBLIC_BACKEND_URL}
    depends_on:
      - backend
