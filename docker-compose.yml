version: '3.8'

services:
  backend:
    build: ./backend
    container_name: atv-paula-backend
    restart: always
    ports:
      - "8010:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/media:/app/media

  frontend:
    build:
      context: ./frontend
      args:
        # Vacío = el navegador usa same-origin /api-backend (HTTPS vía Nginx).
        - NEXT_PUBLIC_BACKEND_URL=
        # Hostname interno Docker (se bakea en los rewrites de Next).
        - BACKEND_INTERNAL_URL=http://backend:8000
    container_name: atv-paula-frontend
    restart: always
    ports:
      - "3010:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - BACKEND_INTERNAL_URL=http://backend:8000
    depends_on:
      - backend
