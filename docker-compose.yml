version: '3.8'

services:
  backend:
    build: ./backend
    container_name: atv-mkt-backend
    restart: always
    ports:
      - "8001:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/media:/app/media

  frontend:
    build:
      context: ./frontend
      args:
        # URL pública del backend (IP o dominio). Si usás Nginx con /api, poné https://tu-dominio.com
        - NEXT_PUBLIC_BACKEND_URL=http://72.60.244.220:8001
    container_name: atv-mkt-frontend
    restart: always
    ports:
      - "3001:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - NEXT_PUBLIC_BACKEND_URL=http://72.60.244.220:8001
    depends_on:
      - backend
